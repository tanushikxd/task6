<!DOCTYPE html>
<html>
<head>
    <title>Fake Users</title>
</head>
<body>

<h2>Generate Fake Users</h2>

<form method="POST">
    <label>Locale:</label>
    <select name="locale">
        <option value="en_US">English (US)</option>
        <option value="de_DE">German (DE)</option>
    </select>

    <br><br>

    <label>Seed:</label>
    <input type="number" name="seed" value="1">

    <br><br>

    <label>Batch:</label>
    <input type="number" name="batch" value="0">

    <br><br>

        <button type="submit" name="action" value="generate">Generate</button>
        <button type="submit" name="action" value="next">Next batch</button></form>
        <form action="/benchmark" method="get">
        <button type="submit">Run Benchmark</button>
</form>

        <input type="hidden" name="batch" value="{{ batch or 0 }}">

<hr>

<h3>Results:</h3>

<table border="1">
    <tr>
    <th>ID</th>
    <th>Full Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Address</th>
    <th>Height</th>
    <th>Latitude</th>
    <th>Longitude</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[6] }}</td>
    <td>{{ row[7] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
