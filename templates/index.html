<!DOCTYPE html>
<html>
<head>
    <title>Fake Users</title>
</head>
<body>

<h2>Generate Fake Users</h2>

<!-- MAIN FORM -->
<form method="POST" action="/">

    <label>Locale:</label>
    <select name="locale">
        <option value="en_US">English (US)</option>
        <option value="de_DE">German (DE)</option>
    </select>

    <br><br>

    <label>Seed:</label>
    <input type="number" name="seed" value="{{ request.form.seed or 1 }}">

    <br><br>

    <!-- IMPORTANT: hidden batch stays INSIDE form -->
    <input type="hidden" name="batch" value="{{ batch or 0 }}">

    <button type="submit" name="action" value="generate">Generate</button>
    <button type="submit" name="action" value="next">Next batch</button>

</form>

<br>

<!-- BENCHMARK (separate, correct) -->
<form action="/benchmark" method="get">
    <button type="submit">Run Benchmark</button>
</form>

<hr>

<h3>Results:</h3>

<table border="1">
<tr>
    <th>ID</th>
    <th>Full Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Address</th>
    <th>Height</th>
    <th>Latitude</th>
    <th>Longitude</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[6] }}</td>
    <td>{{ row[7] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
