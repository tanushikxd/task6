<!DOCTYPE html>
<html>
<head>
    <title>Fake Users</title>
</head>
<body>

<h2>Generate Fake Users</h2>

<form method="POST">
    <label>Locale:</label>
    <select name="locale">
        <option value="en_US">English (US)</option>
        <option value="de_DE">German (DE)</option>
    </select>

    <br><br>

    <label>Seed:</label>
    <input type="number" name="seed" value="1">

    <br><br>

    <label>Batch:</label>
    <input type="number" name="batch" value="0">

    <br><br>

    <button type="submit">Generate</button>
</form>

<hr>

<h3>Results:</h3>

<table border="1">
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Address</th>
        <th>Phone</th>
        <th>Height</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[5] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
